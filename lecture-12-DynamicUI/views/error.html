<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | 404</title>
    <link rel="stylesheet" href="/output.css" />
  </head>
  <body class="flex items-center justify-center min-h-screen bg-gray-50 font-sans p-4 sm:p-6">
    
    <div class="text-center max-w-lg">
      <p class="text-base font-semibold text-emerald-600 tracking-wide uppercase">
        404 Error
      </p>
      
      <h1 class="mt-4 text-4xl font-extrabold tracking-tight text-gray-900 sm:text-5xl">
        Page not found
      </h1>
      
      <p class="mt-6 text-base leading-7 text-gray-600">
        Sorry, we couldn’t find the page you’re looking for. It might have been moved or deleted.
      </p>
      
      <div class="mt-10 flex items-center justify-center gap-x-6">
        <a
          href="/"
          class="rounded-xl bg-emerald-600 px-6 py-3.5 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700 hover:shadow-md focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 transition-all duration-200"
        >
          Go back home
        </a>
        <a href="/" class="text-sm font-semibold text-gray-900 hover:text-emerald-600 transition-colors duration-200">
          Contact support <span aria-hidden="true">&rarr;</span>
        </a>
      </div>
    </div>

  </body>
</html>
