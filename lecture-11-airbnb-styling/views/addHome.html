<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add home to airbnb</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body
    class="flex items-center justify-center min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 p-4"
  >
    <div class="w-full max-w-md">
      <header class="text-center mb-8">
        <h1 class="text-4xl font-bold text-emerald-900">Register Your Home</h1>
      </header>
      <main class="bg-white p-8 rounded-xl shadow-2xl">
        <form action="add-home" method="POST" class="space-y-6">
          <div>
            <label
              for="name"
              class="block text-lg font-semibold text-gray-700 mb-2"
              >Home Name:</label
            >
            <input
              type="text"
              id="name"
              name="user_name"
              required
              class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-emerald-500"
            />
          </div>
          <button
            type="submit"
            class="w-full px-6 py-3 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition transform hover:scale-105"
          >
            Register Home
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
